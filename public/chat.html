<!DOCTYPE HTML>
<!-- Defines The Language Of The Document As English-->
<HTML LANG = 'en'>
    <HEAD>
        <!-- LINK Tag Used To Link External CSS File To Page -->
        <LINK REL= "stylesheet" TYPE = "text/css" HREF = "style.css">
        <!-- Define the Metadata Of The Page - utf-8 covers amost every character/symbol in the world (default)-->
        <META CHARSET= "utf-8">
        <!-- Define The Title Of The HTML Document- Shown In Page's Tab -->
        <TITLE> Home Page </TITLE>
    </HEAD>

    <BODY>
        <!-- Website Banner -->
        <DIV CLASS = "banner">
            <IMG SRC = "img/banner.png" ALT = "Decorative image containing Me and the people/animals I love ">
        </DIV>
        <!-- Navigation Bar -->
        <DIV CLASS = "navigation">
            <UL>
                <LI><A HREF = "index.html"> Home Page </A></LI>
                <LI><A HREF = "moreAbout.html"> More About Me </A></LI>
                <LI><A HREF = "chat.html"> Chat Room</A></LI>
            </UL>
        </DIV>

        <!-- Page Title -->
        <H1> Chat Page </H1>

        <!-- Section 1: Displays All The Active Users That Are Using The Chat-->
        <DIV CLASS = "section">
            <DIV CLASS="sidenav">
                <DIV CLASS="inbox__people">
                    <H2>Active users</H2>
                </DIV>
            </DIV>
        </DIV>

        <BR>
        <HR>

        <!-- Section 2: The Chat Box - All The Chats Between two users in that session are stored here-->
        <DIV CLASS="content">
        <DIV CLASS="chat_history"></DIV>
        <DIV class="fallback"></DIV>
        <DIV class="inbox__messages"></DIV>

        <DIV CLASS = "currentlyTyping"></DIV>
            <!-- -->
            <FORM CLASS="message_form">
            <INPUT TYPE="text" CLASS="message_form__input" PLACEHOLDER="Type a message" />
            <BUTTON CLASS="message_form__button" TYPE="submit">
              Enter
            </BUTTON>
        </FORM>
    </DIV>

    <SCRIPT SRC="/socket.io/socket.io.js"></SCRIPT>
    <SCRIPT SRC="/js/client.js"></SCRIPT>

    </BODY>
</HTML>
